<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>バーチャルツアー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e4dd;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #tour-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #tour-canvas:active { cursor: grabbing; }

  /* ── ヘッダー ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 20px 14px 120px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.85) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    pointer-events: none;
  }
  #header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c8a97e;
  }
  #header h1 {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8a97e;
  }
  #room-name-area {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: all;
  }
  #room-name {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  #shot-btns {
    display: flex;
    gap: 5px;
  }
  .shot-btn {
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 12px;
    border: 1px solid rgba(200,169,126,0.5);
    background: rgba(10,10,15,0.7);
    color: #c8a97e;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
    white-space: nowrap;
  }
  .shot-btn:hover { background: rgba(200,169,126,0.25); }
  .shot-btn.active { background: rgba(200,169,126,0.35); border-color: #c8a97e; }

  /* ── ローディング ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 20px;
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 48px; height: 48px;
    border: 2px solid rgba(200,169,126,0.2);
    border-top-color: #c8a97e;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 12px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; }

  /* ── ルームリスト（下部） ── */
  #room-list {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0 20px 20px;
    background: linear-gradient(to top, rgba(10,10,15,0.9) 0%, transparent 100%);
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    z-index: 100;
    -webkit-overflow-scrolling: touch;
  }
  #room-list::-webkit-scrollbar { display: none; }

  .room-thumb {
    flex: 0 0 auto;
    width: 90px;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.25s, transform 0.25s;
  }
  .room-thumb:hover { opacity: 0.9; transform: translateY(-3px); }
  .room-thumb.active { opacity: 1; }
  .room-thumb.active .thumb-img-wrap { border-color: #c8a97e; }

  .thumb-img-wrap {
    width: 90px; height: 55px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    overflow: hidden;
    background: #1a1a22;
    transition: border-color 0.25s;
  }
  .thumb-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .room-thumb p {
    margin-top: 5px;
    font-size: 10px;
    text-align: center;
    letter-spacing: 0.08em;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .room-thumb.active p { color: #c8a97e; }

  /* ── ホットスポット ── */
  .hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 50;
    pointer-events: all;
    animation: float 2.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-5px); }
  }
  .hotspot-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hotspot-arrow {
    width: 44px; height: 44px;
    background: rgba(200,169,126,0.15);
    border: 1.5px solid rgba(200,169,126,0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
    backdrop-filter: blur(4px);
  }
  .hotspot:hover .hotspot-arrow {
    background: rgba(200,169,126,0.4);
    transform: scale(1.12);
  }
  .hotspot-arrow svg { width: 20px; height: 20px; fill: #c8a97e; }
  .hotspot-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #c8a97e;
    background: rgba(10,10,15,0.7);
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }

  /* ── 間取り図 ── */
  #floorplan {
    position: fixed;
    bottom: 90px;
    right: 16px;
    z-index: 100;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  #floorplan img {
    display: block;
    width: 120px;
    height: auto;
    border-radius: 8px;
    border: 1px solid rgba(200,169,126,0.4);
    opacity: 0.75;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }
  #floorplan.expanded img {
    width: 260px;
    opacity: 0.95;
  }
  #floorplan:hover img { opacity: 0.95; }
  #floorplan-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #888;
    text-align: center;
    margin-top: 4px;
  }


  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 80;
    animation: fadeHint 4s ease forwards;
  }
  @keyframes fadeHint {
    0% { opacity: 0; }
    20% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── 設定パネル（編集モード）── */
  #edit-btn {
    position: fixed;
    top: 14px; left: 20px;
    z-index: 110;
    background: rgba(200,169,126,0.15);
    border: 1px solid rgba(200,169,126,0.4);
    color: #c8a97e;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #edit-btn:hover { background: rgba(200,169,126,0.3); }

  #edit-panel {
    position: fixed;
    top: 0; right: 0;
    width: 340px;
    height: 100vh;
    background: rgba(14,14,20,0.97);
    border-left: 1px solid rgba(200,169,126,0.2);
    z-index: 120;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
  }
  #edit-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-size: 13px; font-weight: 400; letter-spacing: 0.15em; color: #c8a97e; text-transform: uppercase; }
  #close-panel { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; line-height: 1; }

  .panel-section {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .panel-section h3 { font-size: 10px; letter-spacing: 0.2em; color: #666; text-transform: uppercase; margin-bottom: 12px; }

  .room-entry { margin-bottom: 14px; }
  .room-entry label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
  .room-entry input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #e8e4dd;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
  }
  .room-entry input:focus { border-color: rgba(200,169,126,0.5); }
  .room-entry small { font-size: 10px; color: #555; margin-top: 3px; display: block; }

  .add-room-btn, .apply-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 0.08em;
    margin-top: 8px;
  }
  .add-room-btn { background: rgba(255,255,255,0.06); color: #aaa; }
  .add-room-btn:hover { background: rgba(255,255,255,0.1); }
  .apply-btn { background: #c8a97e; color: #0a0a0f; font-weight: 600; }
  .apply-btn:hover { background: #d4b88f; }

  .remove-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 16px;
    cursor: pointer;
    float: right;
    line-height: 1;
    margin-top: -2px;
  }
  .remove-btn:hover { color: #e06060; }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p>Loading tour</p>
</div>

<canvas id="tour-canvas"></canvas>

<div id="header">
  <div class="dot"></div>
  <h1>Virtual Tour</h1>
  <div id="room-name-area">
    <span id="room-name">—</span>
    <div id="shot-btns"></div>
  </div>
</div>

<button id="edit-btn">⚙ 設定</button>

<div id="floorplan" onclick="toggleFloorplan()">
  <img src="https://image.homes.jp/smallimg/image.php?file=http%3A%2F%2Fimg.homes.jp%2F3550356%2Fsale%2F616%2F1%2F1%2Fn7z2.jpg&width=600&height=600" alt="間取り図">
  <div id="floorplan-label">間取り図 タップで拡大</div>
</div>

<div id="room-list"></div>

<div id="edit-panel">
  <div class="panel-header">
    <h2>ルーム設定</h2>
    <button id="close-panel">×</button>
  </div>
  <div class="panel-section">
    <h3>ルーム一覧</h3>
    <div id="room-inputs"></div>
    <button class="add-room-btn" id="add-room-btn">＋ ルームを追加</button>
    <button class="apply-btn" id="apply-btn">適用する</button>
  </div>
  <div class="panel-section">
    <h3>使い方</h3>
    <p style="font-size:11px;color:#666;line-height:1.7;">
      ① 各ルームの名前と360°画像URLを入力<br>
      ② 「適用する」でツアーに反映<br>
      ③ ドラッグ or スワイプで視点移動<br>
      ④ 矢印アイコンをクリックで部屋移動<br><br>
      画像はequirectangular（正距円筒）形式のJPG/PNGを使用してください。
      THETAで撮影した画像はそのまま使えます。
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ────────────────────────────────────────
// デフォルトルームデータ（サンプル）
// ────────────────────────────────────────
const SAMPLE_ROOMS = [
  {
    id: 'genkan',
    name: '玄関',
    shots: [
      { label: 'ドア閉', imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Equirectangular_projection_SW.jpg/2560px-Equirectangular_projection_SW.jpg' },
      { label: 'ドア開', imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Equirectangular_projection_SW.jpg/2560px-Equirectangular_projection_SW.jpg' },
    ],
    hotspots: [
      { targetId: 'living', label: 'リビングへ', yaw: 90 }
    ]
  },
  {
    id: 'living',
    name: 'リビング',
    shots: [
      { label: '', imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Equirectangular_projection_SW.jpg/2560px-Equirectangular_projection_SW.jpg' },
    ],
    hotspots: [
      { targetId: 'genkan', label: '玄関へ', yaw: -90 },
      { targetId: 'bedroom1', label: '洋室1へ', yaw: 60 }
    ]
  },
  {
    id: 'bedroom1',
    name: '洋室1',
    shots: [
      { label: '', imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Equirectangular_projection_SW.jpg/2560px-Equirectangular_projection_SW.jpg' },
    ],
    hotspots: [
      { targetId: 'living', label: 'リビングへ', yaw: 120 }
    ]
  }
];

// ────────────────────────────────────────
// Three.js 360°ビューアー
// ────────────────────────────────────────
let rooms = JSON.parse(JSON.stringify(SAMPLE_ROOMS));
let currentRoomId = rooms[0].id;
let currentShotIndex = 0;

const canvas = document.getElementById('tour-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0.001);

// スフィア（球体内面に画像を貼る）
const geometry = new THREE.SphereGeometry(500, 60, 40);
geometry.scale(-1, 1, 1); // 内側に反転
const textureLoader = new THREE.TextureLoader();
let sphereMesh = null;

// ── ドラッグ・タッチ操作 ──
let isDragging = false;
let prevX = 0, prevY = 0;
let lon = 0, lat = 0;
let targetLon = 0, targetLat = 0;

canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetLon -= (e.clientX - prevX) * 0.2;
  targetLat += (e.clientY - prevY) * 0.1;
  prevX = e.clientX; prevY = e.clientY;
});

canvas.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', () => isDragging = false);
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  targetLon -= (e.touches[0].clientX - prevX) * 0.3;
  targetLat += (e.touches[0].clientY - prevY) * 0.15;
  prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
}, { passive: true });

// ジャイロ
let deviceAlpha = 0, deviceBeta = 0, deviceGamma = 0;
window.addEventListener('deviceorientation', e => {
  deviceAlpha = e.alpha || 0;
  deviceBeta  = e.beta  || 0;
  deviceGamma = e.gamma || 0;
});

// ── テクスチャ読み込み & 部屋切替 ──
const textureCache = {};

function loadRoom(roomId, animate = true, shotIndex = 0) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;

  document.getElementById('loading').classList.remove('hidden');
  currentRoomId = roomId;
  currentShotIndex = shotIndex;

  // ルームリストUI更新
  document.querySelectorAll('.room-thumb').forEach(el => {
    el.classList.toggle('active', el.dataset.id === roomId);
  });
  document.getElementById('room-name').textContent = room.name;

  // ショット切り替えボタン更新
  const shotBtns = document.getElementById('shot-btns');
  shotBtns.innerHTML = '';
  if (room.shots.length > 1) {
    room.shots.forEach((shot, i) => {
      const btn = document.createElement('button');
      btn.className = 'shot-btn' + (i === shotIndex ? ' active' : '');
      btn.textContent = shot.label || `ショット${i+1}`;
      btn.addEventListener('click', () => loadRoom(roomId, false, i));
      shotBtns.appendChild(btn);
    });
  }

  const imageUrl = room.shots[shotIndex].imageUrl;

  const loadTexture = (url) => {
    if (textureCache[url]) return Promise.resolve(textureCache[url]);
    return new Promise((res, rej) => {
      textureLoader.load(url, tex => { textureCache[url] = tex; res(tex); }, undefined, rej);
    });
  };

  loadTexture(imageUrl)
    .then(texture => {
      if (sphereMesh) {
        scene.remove(sphereMesh);
        sphereMesh.material.dispose();
      }
      const material = new THREE.MeshBasicMaterial({ map: texture });
      sphereMesh = new THREE.Mesh(geometry, material);
      scene.add(sphereMesh);

      renderHotspots(room);
      document.getElementById('loading').classList.add('hidden');
      if (animate) targetLon = lon + 15;
    })
    .catch(() => {
      document.getElementById('loading').classList.add('hidden');
      alert('画像の読み込みに失敗しました。\nURLを確認してください：\n' + imageUrl);
    });
}

// ── ホットスポット ──
const hotspotContainer = document.createElement('div');
hotspotContainer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;';
document.body.appendChild(hotspotContainer);

function renderHotspots(room) {
  hotspotContainer.innerHTML = '';
  room.hotspots.forEach(hs => {
    const target = rooms.find(r => r.id === hs.targetId);
    if (!target) return;

    const el = document.createElement('div');
    el.className = 'hotspot';
    el.dataset.yaw = hs.yaw;
    el.style.pointerEvents = 'all';
    el.innerHTML = `
      <div class="hotspot-inner">
        <div class="hotspot-arrow">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L8 8h3v8H9l3 6 3-6h-2V8h3z"/>
          </svg>
        </div>
        <span class="hotspot-label">${hs.label || target.name}</span>
      </div>`;
    el.addEventListener('click', () => {
      el.style.pointerEvents = 'none';
      loadRoom(hs.targetId);
    });
    hotspotContainer.appendChild(el);
  });
}

// ホットスポット位置を毎フレーム更新
function updateHotspotPositions() {
  const hotspots = hotspotContainer.querySelectorAll('.hotspot');
  hotspots.forEach(el => {
    const yawDeg = parseFloat(el.dataset.yaw);
    const pitchDeg = -15; // 少し下目

    const yawRad   = THREE.MathUtils.degToRad(yawDeg + lon);
    const pitchRad = THREE.MathUtils.degToRad(pitchDeg - lat);

    // 球面→正面判定
    const dir = new THREE.Vector3(
      Math.sin(yawRad) * Math.cos(pitchRad),
      Math.sin(pitchRad),
      -Math.cos(yawRad) * Math.cos(pitchRad)
    );
    dir.normalize();

    // カメラの向きと比較（正面にあるか）
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    const dot = dir.dot(camDir);

    if (dot < 0.1) {
      el.style.display = 'none';
      return;
    }
    el.style.display = '';

    // 画面座標へ投影
    const vec = dir.clone().project(camera);
    const x = (vec.x + 1) / 2 * window.innerWidth;
    const y = (-vec.y + 1) / 2 * window.innerHeight;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.opacity = Math.min(1, (dot - 0.1) * 4);
  });
}

// ── アニメーションループ ──
function animate() {
  requestAnimationFrame(animate);

  // スムーズ補間
  lon += (targetLon - lon) * 0.08;
  lat += (targetLat - lat) * 0.08;
  lat = Math.max(-85, Math.min(85, lat));

  const phi   = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);

  camera.lookAt(
    Math.sin(phi) * Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi) * Math.sin(theta)
  );

  updateHotspotPositions();
  renderer.render(scene, camera);
}

// ── ウィンドウリサイズ ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── ルームリストUI構築 ──
function buildRoomList() {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-thumb' + (room.id === currentRoomId ? ' active' : '');
    div.dataset.id = room.id;
    div.innerHTML = `
      <div class="thumb-img-wrap">
        <img src="${room.shots[0].imageUrl}" alt="${room.name}" loading="lazy">
      </div>
      <p>${room.name}</p>`;
    div.addEventListener('click', () => loadRoom(room.id));
    list.appendChild(div);
  });
}

// ── 設定パネル ──
const editBtn    = document.getElementById('edit-btn');
const editPanel  = document.getElementById('edit-panel');
const closePanel = document.getElementById('close-panel');
const roomInputs = document.getElementById('room-inputs');

editBtn.addEventListener('click', () => {
  editPanel.classList.add('open');
  buildEditInputs();
});
closePanel.addEventListener('click', () => editPanel.classList.remove('open'));

function buildEditInputs() {
  roomInputs.innerHTML = '';
  rooms.forEach((room, i) => {
    const div = document.createElement('div');
    div.className = 'room-entry';
    const shotsHtml = room.shots.map((shot, j) => `
      <div style="display:flex;gap:6px;margin-top:5px;">
        <input type="text" placeholder="ラベル（例：ドア閉）" value="${shot.label}" data-ri="${i}" data-si="${j}" data-field="label" style="width:90px;">
        <input type="text" placeholder="画像URL" value="${shot.imageUrl}" data-ri="${i}" data-si="${j}" data-field="imageUrl" style="flex:1;">
        <button class="remove-btn remove-shot-btn" data-ri="${i}" data-si="${j}" style="font-size:13px;">×</button>
      </div>`).join('');
    div.innerHTML = `
      <label>
        ルーム ${i+1}
        <button class="remove-btn remove-room-btn" data-i="${i}" title="削除">×</button>
      </label>
      <input type="text" placeholder="部屋名" value="${room.name}" data-field="name" data-i="${i}">
      <small style="margin-top:4px;display:block;">ショット（複数追加で切り替えボタンが出ます）</small>
      <div class="shots-wrap" data-ri="${i}">${shotsHtml}</div>
      <button class="add-shot-btn" data-ri="${i}" style="margin-top:5px;font-size:11px;background:none;border:1px dashed #333;border-radius:6px;color:#666;padding:4px 10px;cursor:pointer;width:100%;">＋ ショット追加</button>`;
    roomInputs.appendChild(div);
  });

  roomInputs.querySelectorAll('input[data-field="name"]').forEach(inp => {
    inp.addEventListener('input', e => { rooms[e.target.dataset.i].name = e.target.value; });
  });
  roomInputs.querySelectorAll('input[data-ri]').forEach(inp => {
    inp.addEventListener('input', e => {
      const ri = e.target.dataset.ri, si = e.target.dataset.si, field = e.target.dataset.field;
      rooms[ri].shots[si][field] = e.target.value;
    });
  });
  roomInputs.querySelectorAll('.remove-room-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const i = parseInt(e.target.dataset.i);
      if (rooms.length <= 1) return alert('最低1部屋必要です');
      rooms.splice(i, 1); buildEditInputs();
    });
  });
  roomInputs.querySelectorAll('.remove-shot-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const ri = parseInt(e.target.dataset.ri), si = parseInt(e.target.dataset.si);
      if (rooms[ri].shots.length <= 1) return alert('最低1ショット必要です');
      rooms[ri].shots.splice(si, 1); buildEditInputs();
    });
  });
  roomInputs.querySelectorAll('.add-shot-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const ri = parseInt(e.target.dataset.ri);
      rooms[ri].shots.push({ label: '', imageUrl: '' });
      buildEditInputs();
    });
  });
}

document.getElementById('add-room-btn').addEventListener('click', () => {
  rooms.push({ id: 'room_' + Date.now(), name: '新しい部屋', shots: [{ label: '', imageUrl: '' }], hotspots: [] });
  buildEditInputs();
});

document.getElementById('apply-btn').addEventListener('click', () => {
  // テクスチャキャッシュをクリア（URLが変わった場合）
  Object.keys(textureCache).forEach(k => delete textureCache[k]);
  buildRoomList();
  currentRoomId = rooms[0].id;
  loadRoom(currentRoomId, false);
  editPanel.classList.remove('open');
});

function toggleFloorplan() {
  document.getElementById('floorplan').classList.toggle('expanded');
  const label = document.getElementById('floorplan-label');
  const isExpanded = document.getElementById('floorplan').classList.contains('expanded');
  label.textContent = isExpanded ? '間取り図 タップで縮小' : '間取り図 タップで拡大';
}

// ── 初期化 ──
buildRoomList();
animate();
loadRoom(rooms[0].id, false);

// ヒント表示
setTimeout(() => {
  const hint = document.createElement('div');
  hint.id = 'hint';
  hint.textContent = 'ドラッグして視点を動かす';
  document.body.appendChild(hint);
  setTimeout(() => hint.remove(), 4500);
}, 1500);
</script>
</body>
</html>
